<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="roundedRect">
      <rect width="1200" height="1200" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="200" y1="430" x2="1000" y2="430"/>
    <line x1="200" y1="560" x2="1000" y2="560"/>
    <line x1="200" y1="690" x2="1000" y2="690"/>
    <line x1="200" y1="820" x2="1000" y2="820"/>
  </g>

  <!-- Bars (rising chart) -->
  <!-- Bar 1 - shortest -->
  <rect x="215" y="710" width="120" height="150" rx="12" fill="url(#barGrad1)" opacity="0.85"/>
  <!-- Bar 2 -->
  <rect x="375" y="620" width="120" height="240" rx="12" fill="url(#barGrad1)" opacity="0.9"/>
  <!-- Bar 3 -->
  <rect x="535" y="530" width="120" height="330" rx="12" fill="url(#barGrad2)" opacity="0.92"/>
  <!-- Bar 4 -->
  <rect x="695" y="430" width="120" height="430" rx="12" fill="url(#barGrad2)" opacity="0.95"/>
  <!-- Bar 5 - tallest -->
  <rect x="855" y="310" width="120" height="550" rx="12" fill="url(#barGrad3)"/>

  <!-- Glow on tallest bar -->
  <rect x="855" y="310" width="120" height="550" rx="12" fill="url(#barGrad3)" opacity="0.4" filter="url(#glow)"/>

  <!-- Trend line connecting bar tops -->
  <polyline
    points="275,688 435,598 595,508 755,408 915,288"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- Dots on trend line -->
  <circle cx="275" cy="688" r="14" fill="#818cf8"/>
  <circle cx="435" cy="598" r="14" fill="#818cf8"/>
  <circle cx="595" cy="508" r="16" fill="#a78bfa"/>
  <circle cx="755" cy="408" r="16" fill="#a78bfa"/>
  <circle cx="915" cy="288" r="20" fill="#c4b5fd" filter="url(#glow)"/>

  <!-- Upward arrow on last dot -->
  <polygon points="915,240 935,275 895,275" fill="#c4b5fd" opacity="0.9"/>

  <!-- Baseline -->
  <line x1="175" y1="860" x2="1025" y2="860" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.15"/>

  <!-- "FA" monogram watermark at bottom -->
  <text
    x="600"
    y="1020"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="6"
    fill="#ffffff"
    opacity="0.22"
  >FIRSTBRIDGE ANALYTICS</text>
</svg>
