# FirstBridge Analytics — Shopify App configuration
# Reference: https://shopify.dev/docs/apps/build/cli-for-apps/app-configuration

client_id = "da5013ca68c07cace1f4bb8570b20af0"
name = "FirstBridge Analytics"
handle = "firstbridge-analytics"
application_url = "https://firstbridge-analytics.pages.dev"
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
# read_orders requires Protected Customer Data approval in the Partner dashboard.
# For dev stores, request access under Apps → Configuration → Protected customer data.
scopes = "read_products,read_orders,read_all_orders,read_customers,read_inventory,read_reports,read_returns,read_shopify_payments_payouts,read_checkouts,read_gift_cards"

[auth]
redirect_urls = [
  "https://firstbridge-analytics-api.firstbridgeconsulting.workers.dev/auth/callback",
]

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "https://firstbridge-analytics-api.firstbridgeconsulting.workers.dev/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
# Plan changes are reflected in the KV `plan:{shop}` cache so the embedded app
# sees them immediately. Source of truth remains the Billing API.
topics = ["app_subscriptions/update"]
uri = "https://firstbridge-analytics-api.firstbridgeconsulting.workers.dev/webhooks/app_subscriptions/update"

[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "https://firstbridge-analytics-api.firstbridgeconsulting.workers.dev/webhooks/compliance"

# Order sync → D1 analytics tables (order_tax, order_utm, order_product)
[[webhooks.subscriptions]]
topics = ["orders/create"]
uri = "https://firstbridge-analytics-api.firstbridgeconsulting.workers.dev/webhooks/orders/create"

[[webhooks.subscriptions]]
topics = ["orders/updated"]
uri = "https://firstbridge-analytics-api.firstbridgeconsulting.workers.dev/webhooks/orders/updated"

[[webhooks.subscriptions]]
topics = ["orders/cancelled"]
uri = "https://firstbridge-analytics-api.firstbridgeconsulting.workers.dev/webhooks/orders/cancelled"

[[webhooks.subscriptions]]
topics = ["orders/delete"]
uri = "https://firstbridge-analytics-api.firstbridgeconsulting.workers.dev/webhooks/orders/delete"

[pos]
embedded = false

[access]
[access.admin]
direct_api_mode = "online"
embedded_app_direct_api_access = true
