<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FirstBridge Analytics</title>
    <!-- App Bridge is loaded directly from Shopify. data-api-key is required for
         window.shopify.idToken() to work; Vite substitutes %VITE_SHOPIFY_API_KEY%
         at build/serve time from the env var set in vite.config.ts. -->
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"
            data-api-key="%VITE_SHOPIFY_API_KEY%"></script>
  </head>
  <body>
    <!-- App Bridge nav menu. Shopify renders these as primary nav inside the
         admin host, so the merchant always has a one-click path to Settings. -->
    <ui-nav-menu>
      <a href="/" rel="home">FirstBridge Analytics</a>
      <a href="/overview">Overview</a>
      <a href="/profit">Profit</a>
      <a href="/products">Products</a>
      <a href="/customers">Customers</a>
      <a href="/marketing">Marketing</a>
      <a href="/reports">Reports</a>
      <a href="/settings">Settings</a>
      <a href="/billing">Plan</a>
      <a href="/feedback">Feedback</a>
      <a href="/about">About</a>
    </ui-nav-menu>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
